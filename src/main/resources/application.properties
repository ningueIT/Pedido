spring.application.name=pedido

spring.datasource.url=${env.DB_URL}
spring.datasource.username=${env.DB_USERNAME}
spring.datasource.password=${env.DB_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ATENÇÃO: o schema SYSTEM é reservado para o dicionário interno do Oracle.
# Misturar tabelas de aplicação ali pode causar problemas de permissão e em upgrades.
# Crie um schema dedicado (ex.: PEDIDO_APP) e atualize o valor abaixo.
spring.jpa.properties.hibernate.default_schema=SYSTEM

spring.jpa.open-in-view=false

# Flyway — gerencia o schema de forma versionada e reproduzível.
# Se as tabelas já existem, use spring.flyway.baseline-on-migrate=true na primeira execução.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=SYSTEM
# baseline-on-migrate=true é necessário na primeira execução do Flyway em um banco já existente.
# Ele cria a tabela de histórico e baseia o schema atual na versão 1, sem re-executar V1__.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

server.port=8080